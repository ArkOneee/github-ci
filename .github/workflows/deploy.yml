name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/github-ci:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/github-ci:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: julian
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 1337
          script: |
            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
            docker stop github-ci-container || true
            docker rm github-ci-container || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/github-ci:latest
            docker run -d -p 3000:3000 --name github-ci-container ${{ secrets.DOCKER_USERNAME }}/github-ci:latest