name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/github-ci:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/github-ci:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted  # <--- INI KUNCINYA
    steps:
      - name: Deploy Docker Container
        run: |
          # Kita pakai sudo karena biasanya docker butuh izin root di Ubuntu
          echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          sudo docker stop github-ci-container || true
          sudo docker rm github-ci-container || true
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/github-ci:latest
          sudo docker run -d -p 3000:3000 --name github-ci-container ${{ secrets.DOCKER_USERNAME }}/github-ci:latest